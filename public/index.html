<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="SCLTK & SCLTK-Legacy 官方下载站" />
    <title>SCLTK &amp; SCLTK-Legacy 下载站</title>
    <style>
        :root {
            --bg-body: #f6f8fc;
            --bg-card: #ffffff;
            --bg-header: rgba(255, 255, 255, 0.72);
            --bg-capsule: #e8ecf2;
            --bg-slider: #ffffff;
            --bg-modal: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.45);
            --bg-code: #f0f2f8;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #7a7a9a;
            --border-light: #dce0e8;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-capsule: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-btn: 0 4px 14px rgba(79, 124, 255, 0.35);
            --accent: #4f7cff;
            --accent-hover: #3a66e0;
            --accent-light: rgba(79, 124, 255, 0.12);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.10);
            --error-border: rgba(239, 68, 68, 0.20);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.12);
            --success-border: rgba(16, 185, 129, 0.25);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --transition-smooth: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-soft: 0.25s ease;
            --transition-fast: 0.15s ease;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-mono: "Maple Mono NL NF CN", "JetBrains Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        }

        [data-theme="dark"] {
            --bg-body: #0d0d1a;
            --bg-card: #18182b;
            --bg-header: rgba(24, 24, 43, 0.78);
            --bg-capsule: #28283e;
            --bg-slider: #3a3a5a;
            --bg-modal: #1e1e34;
            --bg-overlay: rgba(0, 0, 0, 0.65);
            --bg-code: #141428;
            --text-primary: #eaeaf0;
            --text-secondary: #b8b8d0;
            --text-muted: #8888aa;
            --border-light: #2e2e4a;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
            --shadow-capsule: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-btn: 0 4px 14px rgba(79, 124, 255, 0.3);
            --accent: #5d85ff;
            --accent-hover: #4a72e8;
            --accent-light: rgba(93, 133, 255, 0.18);
            --success: #34d399;
            --success-bg: rgba(52, 211, 153, 0.15);
            --success-border: rgba(52, 211, 153, 0.25);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 24px 48px;
            transition: background var(--transition-soft), color var(--transition-soft);
        }

        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        .app {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 12px;
            flex: 1 0 auto;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .toolbar__group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar__btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            font-family: inherit;
            line-height: 1.5;
        }

        .toolbar__btn:hover {
            background: var(--accent-light);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .toolbar__btn:active {
            transform: translateY(0);
        }

        .toolbar__btn .icon {
            font-size: 1rem;
            line-height: 1;
        }

        .toolbar__btn--theme {
            width: 36px;
            height: 36px;
            padding: 0;
            justify-content: center;
        }

        .toolbar__btn--theme:hover {
            transform: rotate(12deg);
        }

        .main-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            padding: 20px 24px 24px;
            margin-bottom: 24px;
            transition: all var(--transition-soft);
        }

        .banner {
            text-align: center;
            padding: 0;
            margin-bottom: 20px;
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .banner__title {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), #8b6cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .banner__copyright {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            -webkit-text-fill-color: var(--text-muted);
        }

        .selector {
            padding: 0;
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .selector__row {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 8px;
        }

        .selector__item {
            flex: 1;
            min-width: 0;
        }

        .selector__action {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            padding-bottom: 2px;
        }

        .capsule {
            position: relative;
            display: flex;
            background: var(--bg-capsule);
            border-radius: var(--radius-full);
            padding: 3px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
            transition: background var(--transition-soft);
            user-select: none;
            -webkit-user-select: none;
        }

        .capsule__slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: calc(50% - 3px);
            height: calc(100% - 6px);
            background: var(--bg-slider);
            border-radius: var(--radius-full);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition-soft);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            will-change: transform;
            pointer-events: none;
        }

        .capsule__slider--right {
            transform: translateX(100%);
        }

        .capsule__option {
            flex: 1;
            text-align: center;
            padding: 6px 14px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: color var(--transition-soft);
            z-index: 1;
            position: relative;
            border-radius: var(--radius-full);
            letter-spacing: 0.2px;
        }

        .capsule__option--active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .capsule__option:hover:not(.capsule__option--active) {
            color: var(--text-secondary);
        }

        .capsule__option:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius-full);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            letter-spacing: 0.5px;
            white-space: nowrap;
            line-height: 1.5;
            text-decoration: none;
        }

        .btn--primary {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow-btn);
        }

        .btn--primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 124, 255, 0.4);
        }

        .btn--primary:active {
            transform: translateY(0);
        }

        .btn--primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn--confirm {
            padding: 6px 18px;
            height: 34px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn--secondary {
            background: var(--bg-capsule);
            color: var(--text-secondary);
        }

        .btn--secondary:hover {
            background: var(--accent-light);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .btn--secondary:active {
            transform: translateY(0);
        }

        .btn--ghost {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
        }

        .btn--ghost:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn--disabled {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
        }

        .btn--write {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
            font-weight: 600;
        }

        .btn--write:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(16, 185, 129, 0.45);
            filter: brightness(1.05);
        }

        .btn--write:active {
            transform: translateY(0);
        }

        .btn--write:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .btn--write .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status {
            text-align: center;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
            font-weight: 500;
            line-height: 1.5;
        }

        .status--error {
            display: block;
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid var(--error-border);
        }

        .status--loading {
            display: block;
            color: var(--text-muted);
            background: var(--bg-capsule);
        }

        .status--success {
            display: block;
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success-border);
        }

        .card-area {
            min-height: 100px;
            transition: all var(--transition-soft);
            margin-bottom: 24px;
        }

        .card-area__empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border-light);
            transition: all var(--transition-soft);
        }

        .card-area__empty .icon-big {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.5;
            line-height: 1;
        }

        .download-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.4s ease,
                opacity 0.3s ease;
            transform-origin: top center;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(24px) scale(0.96);
            animation: cardEnter 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .download-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-card), 0 12px 40px rgba(0, 0, 0, 0.06);
        }

        [data-theme="dark"] .download-card:hover {
            box-shadow: var(--shadow-card), 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .download-card--exit {
            opacity: 0 !important;
            transform: translateY(-10px) scale(0.97) !important;
            transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
            pointer-events: none;
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .download-card__header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px 14px;
            margin-bottom: 14px;
        }

        .download-card__name {
            font-size: clamp(1.15rem, 3vw, 1.3rem);
            font-weight: 700;
            color: var(--text-primary);
        }

        .download-card__version {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 12px;
            border-radius: var(--radius-full);
            letter-spacing: 0.2px;
        }

        .download-card__actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 2px;
        }

        .download-card__sig-hint {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            padding-top: 6px;
            line-height: 1.5;
        }

        .download-card__write-info {
            margin-top: 12px;
            margin-bottom: 2px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            padding-top: 6px;
            line-height: 1.5;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal--open {
            opacity: 1;
            visibility: visible;
        }

        .modal__box {
            background: var(--bg-modal);
            border-radius: var(--radius-lg);
            max-width: 820px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            transform: scale(0.95) translateY(12px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .modal--open .modal__box {
            transform: scale(1) translateY(0);
        }

        .modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 14px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .modal__title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .modal__close {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: var(--bg-capsule);
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .modal__close:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .modal__body {
            padding: 18px 24px 24px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.6;
        }

        .code-block {
            position: relative;
            background: var(--bg-code);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
            margin: 12px 0;
        }

        .code-block pre,
        .code-block code,
        .raw-content,
        .modal__body pre,
        .modal__body code {
            font-family: var(--font-mono) !important;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-secondary);
        }

        .code-block pre {
            padding: 14px 18px;
            margin: 0;
            background: transparent;
            border: none;
            max-height: 50vh;
            overflow-y: auto;
        }

        .code-block__copy {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--bg-capsule);
            border: none;
            border-radius: var(--radius-sm);
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            opacity: 0.7;
            z-index: 2;
        }

        .code-block__copy:hover {
            background: var(--accent-light);
            color: var(--accent);
            opacity: 1;
        }

        .code-block__copy--copied {
            background: var(--accent) !important;
            color: #fff !important;
            opacity: 1 !important;
        }

        .raw-content {
            background: var(--bg-code);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            margin: 0;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .announcement-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            word-break: break-word;
        }

        .announcement-content>*+* {
            margin-top: 0.75em;
        }

        .announcement-content h2,
        .announcement-content h3,
        .announcement-content h4 {
            color: var(--text-primary);
            margin-top: 1.2em;
            margin-bottom: 0.4em;
            line-height: 1.3;
        }

        .announcement-content h2:first-child,
        .announcement-content h3:first-child,
        .announcement-content h4:first-child {
            margin-top: 0;
        }

        .announcement-content ul,
        .announcement-content ol {
            padding-left: 1.5em;
            margin: 0.5em 0;
        }

        .announcement-content li {
            margin-bottom: 0.35em;
        }

        .announcement-content li>p {
            margin: 0;
        }

        .announcement-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition-fast);
        }

        .announcement-content a:hover {
            border-bottom-color: var(--accent);
        }

        .announcement-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1em;
            margin: 0.5em 0;
            color: var(--text-muted);
        }

        .announcement-content code {
            font-family: var(--font-mono);
            background: var(--bg-capsule);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .announcement-content pre {
            font-family: var(--font-mono);
            background: var(--bg-code);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            margin: 0.5em 0;
        }

        .announcement-content pre code {
            background: transparent;
            padding: 0;
            font-size: inherit;
        }

        .method {
            margin-bottom: 28px;
        }

        .method:last-child {
            margin-bottom: 0;
        }

        .method__title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .method__steps {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .method__steps ol {
            padding-left: 20px;
            margin: 0;
        }

        .method__steps li {
            margin-bottom: 6px;
        }

        .method__steps li>code {
            background: var(--bg-capsule);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 0.85em;
        }

        .base64-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-btn);
            letter-spacing: 0.3px;
            line-height: 1.5;
        }

        .base64-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 124, 255, 0.4);
        }

        .base64-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .base64-btn:disabled {
            opacity: 0.6;

    <footer class="site-footer">
        <p>
            构建自
            <a href="https://github.com/MaxLHy0424/SCLTK-Website" target="_blank" rel="noopener">SCLTK-Website</a>
            &amp;
            <a href="https://github.com/MaxLHy0424/SCLTK-Website-Template" target="_blank"
                rel="noopener">SCLTK-Website-Template</a>
        </p>
    </footer>

    <div id="modalContainer"></div>

    <script>
        (function () {
            'use strict';

            const Utils = {
                escapeHtml(text) {
                    const d = document.createElement('div');
                    d.textContent = text;
                    return d.innerHTML;
                },

                async fetchWithTimeout(url, options = {}, timeout = 10000) {
                    const ctrl = new AbortController();
                    const id = setTimeout(() => ctrl.abort(), timeout);
                    try {
                        const resp = await fetch(url, { ...options, signal: ctrl.signal });
                        clearTimeout(id);
                        return resp;
                    } catch (err) {
                        clearTimeout(id);
                        if (err.name === 'AbortError') throw new Error('请求超时');
                        throw err;
                    }
                },

                parseJsonc(text) {
                    let out = '';
                    let inStr = false;
                    let strChar = '';
                    let inComment = false;
                    let i = 0;
                    const len = text.length;
                    while (i < len) {
                        const ch = text[i];
                        if (!inComment && !inStr && ch === '/' && text[i + 1] === '/') {
                            while (i < len && text[i] !== '\n' && text[i] !== '\r') i++;
                            continue;
                        }
                        if (!inComment && !inStr && ch === '/' && text[i + 1] === '*') {
                            inComment = true;
                            i += 2;
                            continue;
                        }
                        if (inComment && ch === '*' && text[i + 1] === '/') {
                            inComment = false;
                            i += 2;
                            continue;
                        }
                        if (!inComment && !inStr && (ch === '"' || ch === "'")) {
                            inStr = true;
                            strChar = ch;
                            out += ch;
                            i++;
                            continue;
                        }
                        if (inStr && ch === strChar && text[i - 1] !== '\\') {
                            inStr = false;
                            out += ch;
                            i++;
                            continue;
                        }
                        if (inComment) { i++; continue; }
                        out += ch;
                        i++;
                    }
                    return JSON.parse(out);
                },

                parseMarkdownLite(text) {
                    const lines = text.split('\n');
                    const blocks = [];
                    let list = [];
                    let code = [];
                    let inCode = false;

                    const flushList = () => {
                        if (list.length) {
                            blocks.push('<ul>' + list.map(item =>
                                `<li>${Utils.escapeHtml(item)}</li>`).join('') + '</ul>');
                            list = [];
                        }
                    };
                    const flushCode = () => {
                        if (code.length) {
                            blocks.push(`<pre><code>${Utils.escapeHtml(code.join('\n'))}</code></pre>`);
                            code = [];
                        }
                    };

                    for (const line of lines) {
                        const t = line.trim();
                        if (t.startsWith('```')) {
                            if (inCode) {
                                flushCode();
                                inCode = false;
                            } else {
                                flushList();
                                inCode = true;
                            }
                            continue;
                        }
                        if (inCode) { code.push(line); continue; }
                        if (!t) { flushList(); continue; }
                        if (/^[-*]\s+/.test(t)) {
                            list.push(t.replace(/^[-*]\s+/, ''));
                            continue;
                        }
                        flushList();
                        const hd = t.match(/^(#{1,4})\s+(.*)$/);
                        if (hd) {
                            const level = hd[1].length + 1;
                            blocks.push(`<h${level}>${Utils.escapeHtml(hd[2])}</h${level}>`);
                            continue;
                        }
                        let content = Utils.escapeHtml(line);
                        content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                        content = content.replace(/\*(.+?)\*/g, '<em>$1</em>');
                        content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
                        content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                            '<a href="$2" target="_blank" rel="noopener">$1</a>');
                        if (content) blocks.push(`<p>${content}</p>`);
                    }
                    flushList();
                    if (inCode) flushCode();
                    return `<div class="announcement-content">${blocks.join('')}</div>`;
                },

                formatFileSize(bytes) {
                    if (bytes < 1024) return bytes + ' B';
                    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
                    return (bytes / 1073741824).toFixed(1) + ' GB';
                },

                getFileNameFromUrl(url) {
                    try {
                        const u = new URL(url);
                        let name = u.pathname.split('/').pop() || 'file';
                        name = name.split('?')[0].split('#')[0];
                        return decodeURIComponent(name) || 'file';
                    } catch {
                        const parts = url.split('/');
                        let name = parts.pop() || 'file';
                        name = name.split('?')[0].split('#')[0];
                        return name || 'file';
                    }
                }
            };

            const Clipboard = {
                async copy(text) {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        return true;
                    }
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.cssText = 'position:fixed;opacity:0';
                    document.body.appendChild(ta);
                    ta.select();
                    const ok = document.execCommand('copy');
                    document.body.removeChild(ta);
                    return ok;
                },

                async copyFromElement(btn, targetId) {
                    const pre = document.getElementById(targetId);
                    if (!pre) return false;
                    const ok = await this.copy(pre.textContent);
                    if (ok) this.feedback(btn);
                    return ok;
                },

                feedback(btn) {
                    const orig = btn.textContent;
                    btn.textContent = '已复制';
                    btn.classList.add('code-block__copy--copied');
                    setTimeout(() => {
                        btn.textContent = orig;
                        btn.classList.remove('code-block__copy--copied');
                    }, 2000);
                }
            };

            class ModalManager {
                constructor(container) {
                    this.container = container;
                    this.active = null;
                    this.registry = new Map();
                }

                register(id, config) {
                    this.registry.set(id, config);
                    this._render(id, config);
                    this._bind(id);
                }

                _render(id, config) {
                    const html = `
                    <div class="modal" id="modal${id}" role="dialog" aria-modal="true" aria-labelledby="modal${id}Title">
                        <div class="modal__box">
                            <div class="modal__header">
                                <h2 class="modal__title" id="modal${id}Title">${config.title}</h2>
                                <button class="modal__close" id="modal${id}Close" aria-label="关闭">✕</button>
                            </div>
                            <div class="modal__body" id="${config.bodyId}">
                                ${config.initialContent || '<span class="loading-text">⏳ 加载中…</span>'}
                            </div>
                        </div>
                    </div>`;
                    const wrap = document.createElement('div');
                    wrap.innerHTML = html.trim();
                    this.container.appendChild(wrap.firstElementChild);
                }

                _bind(id) {
                    const modal = document.getElementById(`modal${id}`);
                    const close = document.getElementById(`modal${id}Close`);
                    close.addEventListener('click', () => this.close(id));
                    modal.addEventListener('click', (e) => { if (e.target === modal) this.close(id); });
                }

                open(id, contentFn) {
                    const modal = document.getElementById(`modal${id}`);
                    if (!modal) return;
                    if (contentFn) {
                        const body = modal.querySelector('.modal__body');
                        contentFn(body);
                    }
                    modal.classList.add('modal--open');
                    this.active = modal;
                    document.body.style.overflow = 'hidden';
                }

                close(id) {
                    const modal = id ? document.getElementById(`modal${id}`) : this.active;
                    if (!modal) return;
                    modal.classList.remove('modal--open');
                    if (this.active === modal) {
                        this.active = null;
                        document.body.style.overflow = '';
                    }
                }

                closeAll() {
                    document.querySelectorAll('.modal--open').forEach(m => m.classList.remove('modal--open'));
                    this.active = null;
                    document.body.style.overflow = '';
                }
            }

            function createCapsule(slider, options, onChange) {
                let active = 0;
                const setActive = (idx) => {
                    if (idx === active) return;
                    active = idx;
                    slider.classList.toggle('capsule__slider--right', idx === 1);
                    options.forEach((opt, i) => {
                        const isActive = i === idx;
                        opt.classList.toggle('capsule__option--active', isActive);
                        opt.setAttribute('aria-checked', isActive ? 'true' : 'false');
                        opt.tabIndex = isActive ? 0 : -1;
                    });
                    onChange(options[idx].dataset.value);
                };
                options.forEach((opt, idx) => {
                    opt.addEventListener('click', () => setActive(idx));
                    opt.addEventListener('keydown', (e) => {
                        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                            e.preventDefault();
                            const next = (idx + 1) % options.length;
                            setActive(next);
                            options[next].focus();
                        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                            e.preventDefault();
                            const prev = (idx - 1 + options.length) % options.length;
                            setActive(prev);
                            options[prev].focus();
                        }
                    });
                });
                return {
                    getValue: () => options[active].dataset.value,
                    setValue: (val) => {
                        const idx = options.findIndex(o => o.dataset.value === val);
                        if (idx >= 0) setActive(idx);
                    }
                };
            }

            class SCLTKApp {
                constructor() {
                    this.state = {
                        data: null,
                        loaded: false,
                        project: 'SCLTK',
                        version: 'stable',
                        cardProject: '',
                        cardVersion: '',
                        theme: 'light',
                        cache: { gpg: null, license: null, announcement: null },
                        flags: { gpg: false, license: false, announcement: false },
                        writing: false
                    };

                    this.dom = this._cacheDom();
                    this.modal = new ModalManager(this.dom.modalContainer);
                    this._init();
                }

                _cacheDom() {
                    const $ = (s, ctx = document) => ctx.querySelector(s);
                    const $$ = (s, ctx = document) => [...ctx.querySelectorAll(s)];
                    return {
                        copyright: $('#copyrightText'),
                        projectGroup: $('#projectGroup'),
                        versionGroup: $('#versionGroup'),
                        projectSlider: $('#projectSlider'),
                        versionSlider: $('#versionSlider'),
                        projectOpts: () => $$('.capsule__option', $('#projectGroup')),
                        versionOpts: () => $$('.capsule__option', $('#versionGroup')),
                        confirm: $('#btnConfirm'),
                        status: $('#statusMessage'),
                        cardArea: $('#cardArea'),
                        emptyState: $('#emptyState'),
                        btnGpg: $('#btnGpg'),
                        btnLicense: $('#btnLicense'),
                        btnTheme: $('#btnTheme'),
                        themeIcon: $('#themeIcon'),
                        btnAnnouncement: $('#btnAnnouncement'),
                        modalContainer: $('#modalContainer')
                    };
                }

                async _init() {
                    this._initTheme();
                    this._initCapsules();
                    this._initModals();
                    this._bindEvents();

                    this._showStatus('loading', '⏳ 加载版本数据…');
                    await this._loadData();

                    if (this.state.loaded) {
                        this._hideStatus();
                        this._setCapsuleValues('SCLTK', 'stable');
                        this._loadGpg().catch(() => { });
                        this._loadLicense().catch(() => { });
                    } else {
                        this._showStatus('error', '❌ 无法加载版本数据文件，请检查控制台错误信息');
                    }
                }

                _initTheme() {
                    const stored = localStorage.getItem('scltk-theme');
                    if (stored === 'dark' || stored === 'light') {
                        this._setTheme(stored);
                        return;
                    }
                    const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    this._setTheme(prefers ? 'dark' : 'light');
                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                        if (!localStorage.getItem('scltk-theme')) {
                            this._setTheme(e.matches ? 'dark' : 'light');
                        }
                    });
                }

                _setTheme(theme) {
                    this.state.theme = theme;
                    document.documentElement.setAttribute('data-theme', theme);
                    this.dom.themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
                    localStorage.setItem('scltk-theme', theme);
                }

                _toggleTheme() {
                    this._setTheme(this.state.theme === 'light' ? 'dark' : 'light');
                }

                _initCapsules() {
                    this.projectCapsule = createCapsule(
                        this.dom.projectSlider,
                        this.dom.projectOpts(),
                        (v) => { this.state.project = v; }
                    );
                    this.versionCapsule = createCapsule(
                        this.dom.versionSlider,
                        this.dom.versionOpts(),
                        (v) => { this.state.version = v; }
                    );
                }

                _setCapsuleValues(project, version) {
                    this.projectCapsule.setValue(project);
                    this.versionCapsule.setValue(version);
                    this.state.project = project;
                    this.state.version = version;
                }

                _initModals() {
                    this.modal.register('Gpg', {
                        title: '🔑 GPG 公钥',
                        bodyId: 'gpgBody',
                        initialContent: '<span class="loading-text">⏳ 加载中…</span>'
                    });
                    this.modal.register('License', {
                        title: '📄 许可证',
                        bodyId: 'licenseBody',
                        initialContent: '<span class="loading-text">⏳ 加载中…</span>'
                    });
                    this.modal.register('Alt', {
                        title: '✨ 备用获取方案',
                        bodyId: 'altBody'
                    });
                    this.modal.register('Enhanced', {
                        title: '⚙️ 增强配置',
                        bodyId: 'enhancedBody'
                    });
                    this.modal.register('Announcement', {
                        title: '📢 公告',
                        bodyId: 'announcementBody',
                        initialContent: '<span class="loading-text">⏳ 加载中…</span>'
                    });
                }

                _bindEvents() {
                    this.dom.btnTheme.addEventListener('click', () => this._toggleTheme());

                    this.dom.btnGpg.addEventListener('click', () => {
                        this.modal.open('Gpg', async (body) => {
                            if (!this.state.flags.gpg) {
                                body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                                await this._loadGpg();
                            }
                            body.innerHTML =
                                `<pre class="raw-content">${Utils.escapeHtml(this.state.cache.gpg || '加载失败')}</pre>`;
                        });
                    });

                    this.dom.btnLicense.addEventListener('click', () => {
                        this.modal.open('License', async (body) => {
                            if (!this.state.flags.license) {
                                body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                                await this._loadLicense();
                            }
                            body.innerHTML =
                                `<pre class="raw-content">${Utils.escapeHtml(this.state.cache.license || '加载失败')}</pre>`;
                        });
                    });

                    this.dom.btnAnnouncement.addEventListener('click', () => {
                        this.modal.open('Announcement', (body) => {
                            if (this.state.flags.announcement && this.state.cache.announcement) {
                                body.innerHTML = Utils.parseMarkdownLite(this.state.cache.announcement);
                            } else {
                                body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                            }
                        });
                    });

                    this.dom.confirm.addEventListener('click', () => this._handleConfirm());
                    this.dom.confirm.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            this._handleConfirm();
                        }
                    });

                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') this.modal.closeAll();
                    });

                    window.addEventListener('unhandledrejection', (e) => {
                        console.error('未处理的 Promise 拒绝:', e.reason);
                        if (!this.state.loaded) {
                            this._showStatus('error', '⚠️ 加载数据时发生错误，请刷新页面重试');
                        }
                    });
                }

                async _loadData() {
                    try {
                        const resp = await Utils.fetchWithTimeout('assets/SCLTK-Website.jsonc');
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.data = Utils.parseJsonc(text);
                        this.state.loaded = true;

                        const { copyright, announcement_file } = this.state.data;
                        this.dom.copyright.textContent = copyright || '© SCLTK Project';

                        if (announcement_file && typeof announcement_file === 'string') {
                            const file = announcement_file.trim();
                            if (file) {
                                this.dom.btnAnnouncement.style.display = 'inline-flex';
                                this._loadAnnouncement(file).catch(() => { });
                            }
                        }
                    } catch (err) {
                        console.error('加载 SCLTK-Website.jsonc 失败:', err);
                        this._showStatus('error', '❌ 加载版本数据失败: ' + err.message);
                    }
                }

                async _loadGpg() {
                    try {
                        const resp = await Utils.fetchWithTimeout('assets/gpg-public-key.txt');
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.cache.gpg = text.trim() || '(空)';
                    } catch (err) {
                        console.error('加载 GPG 失败:', err);
                        this.state.cache.gpg = '❌ 加载失败: ' + err.message;
                    }
                    this.state.flags.gpg = true;
                }

                async _loadLicense() {
                    try {
                        const resp = await Utils.fetchWithTimeout('assets/SCLTK-License.txt');
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.cache.license = text.trim() || '(空)';
                    } catch (err) {
                        console.error('加载 License 失败:', err);
                        this.state.cache.license = '❌ 加载失败: ' + err.message;
                    }
                    this.state.flags.license = true;
                }

                async _loadAnnouncement(filePath) {
                    try {
                        const url = filePath.startsWith('http') ? filePath :
                            new URL(filePath, window.location.href).href;
                        const resp = await Utils.fetchWithTimeout(url);
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        this.state.cache.announcement = await resp.text();
                    } catch (err) {
                        console.error('加载公告失败:', err);
                        this.state.cache.announcement = '❌ 加载公告失败: ' + err.message;
                        this.dom.btnAnnouncement.style.display = 'none';
                    }
                    this.state.flags.announcement = true;
                }

                _showStatus(type, msg) {
                    const el = this.dom.status;
                    el.className = 'status';
                    el.textContent = msg || '';
                    el.style.display = msg ? 'block' : 'none';
                    if (type === 'error') {
                        el.classList.add('status--error');
                        this.dom.confirm.disabled = true;
                    } else if (type === 'loading') {
                        el.classList.add('status--loading');
                        this.dom.confirm.disabled = false;
                    } else if (type === 'success') {
                        el.classList.add('status--success');
                        this.dom.confirm.disabled = false;
                    } else {
                        this.dom.confirm.disabled = false;
                    }
                }

                _hideStatus() {
                    const el = this.dom.status;
                    el.style.display = 'none';
                    el.className = 'status';
                    this.dom.confirm.disabled = false;
                }

                _handleConfirm() {
                    if (!this.state.loaded) {
                        this._showStatus('error', '⏳ 数据加载中，请稍候…');
                        return;
                    }
                    const { project, version, data } = this.state;
                    if (!data) {
                        this._showStatus('error', '❌ 数据加载失败，请刷新页面');
                        return;
                    }
                    if (!data[project]) {
                        this._showStatus('error', `项目 "${project}" 不存在`);
                        return;
                    }
                    if (!data[project][version]) {
                        this._showStatus('error', `版本 "${version}" 不存在于 "${project}" 中`);
                        return;
                    }
                    this._renderCard(project, version);
                }

                _renderCard(projectKey, versionKey) {
                    const data = this.state.data;
                    if (!data) return;

                    const proj = data[projectKey];
                    const ver = proj?.[versionKey];
                    if (!ver?.version || !ver?.program) {
                        this._showStatus('error', '版本数据不完整: 缺少 version 或 program 字段');
                        return;
                    }

                    this._hideStatus();
                    this.state.cardProject = projectKey;
                    this.state.cardVersion = versionKey;

                    const displayName = projectKey === 'SCLTK' ? 'SCLTK' : 'SCLTK-Legacy';
                    const versionLabel = versionKey === 'stable' ? '稳定版' : '预览版';
                    const versionDisplay = `${versionLabel} ${ver.version}`;
                    const hasSig = !!ver.sig;
                    const hasEnhanced = !!ver.enhanced_config;
                    const enhancedFileName = hasEnhanced ? (ver.enhanced_config.split('/').pop() || '配置文件') : '';
                    const supportsWrite = !!window.showDirectoryPicker;

                    const actions = [
                        `<a class="btn btn--primary" href="${ver.program}" download><span aria-hidden="true">📥</span> 下载程序</a>`
                    ];

                    if (supportsWrite) {
                        actions.push(
                            `<button class="btn btn--write" id="btnWriteToFolder"><span aria-hidden="true">💾</span> 浏览器直接写入</button>`
                        );
                    }

                    if (hasSig) {
                        actions.push(
                            `<a class="btn btn--ghost" href="${ver.sig}" download><span aria-hidden="true">🔏</span> 下载签名</a>`
                        );
                    } else {
                        actions.push(
                            `<span class="btn btn--secondary btn--disabled"><span aria-hidden="true">🔏</span> 签名文件不可用</span>`
                        );
                    }

                    actions.push(
                        `<button class="btn btn--ghost" id="btnAlt"><span aria-hidden="true">✨</span> 备用获取方案</button>`
                    );

                    if (hasEnhanced) {
                        actions.push(
                            `<button class="btn btn--ghost" id="btnEnhanced" data-path="${ver.enhanced_config}"><span aria-hidden="true">⚙️</span> 查看增强配置 ${Utils.escapeHtml(enhancedFileName)}</button>`
                        );
                    }

                    const sigHint = hasSig ?
                        `<div class="download-card__sig-hint"><span aria-hidden="true">💡</span> 使用 GPG 签名验证文件完整性，点击左上角「GPG 公钥」查看开发者公钥</div>` :
                        '';

                    const writeInfo = supportsWrite ?
                        `<div class="download-card__write-info"><span aria-hidden="true">💡</span> 点击「浏览器直接写入」选择文件夹，将自动写入程序${hasSig ? '、签名' : ''}${hasEnhanced ? '、增强配置' : ''}</div>` :
                        '';

                    const cardHtml = `
                    <div class="download-card" role="article">
                        <div class="download-card__header">
                            <span class="download-card__name">${displayName}</span>
                            <span class="download-card__version">${versionDisplay}</span>
                        </div>
                        <div class="download-card__actions">${actions.join('')}</div>
                        ${writeInfo}
                        ${sigHint}
                    </div>`;

                    const empty = this.dom.emptyState;
                    if (empty) empty.remove();

                    const existing = this.dom.cardArea.querySelector('.download-card');
                    if (existing) {
                        existing.classList.add('download-card--exit');
                        setTimeout(() => {
                            this.dom.cardArea.innerHTML = cardHtml;
                            this._bindCardButtons();
                        }, 300);
                    } else {
                        this.dom.cardArea.innerHTML = cardHtml;
                        this._bindCardButtons();
                    }
                }

                _bindCardButtons() {
                    const alt = document.getElementById('btnAlt');
                    if (alt) alt.addEventListener('click', () => this._openAltModal());

                    const enhanced = document.getElementById('btnEnhanced');
                    if (enhanced) {
                        enhanced.addEventListener('click', () => {
                            const path = enhanced.dataset.path;
                            if (path) this._openEnhancedModal(path);
                        });
                    }

                    const write = document.getElementById('btnWriteToFolder');
                    if (write) write.addEventListener('click', () => this._writeToFolder());
                }

                _openAltModal() {
                    const { cardProject, cardVersion, data } = this.state;
                    if (!cardProject || !cardVersion || !data) return;
                    const ver = data[cardProject]?.[cardVersion];
                    if (!ver?.program) return;

                    const url = ver.program.startsWith('http') ? ver.program :
                        new URL(ver.program, window.location.href).href;
                    const fileName = Utils.getFileNameFromUrl(url);

                    const methods = [{
                        id: 'base64',
                        title: 'Base64 解析（推荐）',
                        steps: [
                            '在任意盘符顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.txt</code>。',
                            '打开 <code>SCLTK.txt</code>，复制下方 “代码块 A” 中的内容并保存。不要添加任何多余字符，包括注释、换行、空格等。',
                            '点击文件资源管理器的地址栏，复制并执行下方 “代码块 B-1” 或 “代码块 B-2” 中的命令。'
                        ],
                        isBase64: true,
                        fileName,
                        url
                    }, {
                        id: 'certutil',
                        title: 'certutil 下载（推荐）',
                        steps: [
                            '在任意分区的顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>）。',
                            '点击文件资源管理器的地址栏，复制并执行如下命令：'
                        ],
                        code: `certutil -urlcache -split -f "${url}" "${fileName}"`
                    }, {
                        id: 'vbscript',
                        title: 'VBScript 下载',
                        steps: [
                            '在任意分区的顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.vbs</code>。',
                            '使用文本编辑器打开 <code>SCLTK.vbs</code>，复制下方代码并保存。',
                            '运行 <code>SCLTK.vbs</code>。弹出 "OK!" 代表下载完毕。如果失败，可以多运行几次。'
                        ],
                        code: `Option Explicit\nDim url, fileName\nurl = "${url}"\nfileName = "${fileName}"\nDim http, stream\nOn Error Resume Next\nSet http = CreateObject("MSXML2.ServerXMLHTTP")\nSet stream = CreateObject("ADODB.Stream")\nhttp.setOption 2, 13056\nhttp.Open "GET", url, False\nhttp.Send\nIf Err.Number <> 0 Then\n    WScript.Echo "[FAILED] Network Error: " & Err.Description\n    WScript.Quit 1\nEnd If\nIf http.Status <> 200 Then\n    WScript.Echo "[FAILED] HTTP Status: " & http.Status\n    WScript.Quit 1\nEnd If\nstream.Type = 1\nstream.Open\nstream.Write http.ResponseBody\nstream.SaveToFile fileName, 2\nstream.Close\nIf Err.Number <> 0 Then\n    WScript.Echo "[FAILED] File Write Error: " & Err.Description\n    WScript.Quit 1\nEnd If\nOn Error GoTo 0\nWScript.Echo "OK!"\nWScript.Quit 0`
                    }, {
                        id: 'python',
                        title: 'Python 下载',
                        steps: [
                            '在任意分区顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.py</code>。',
                            '使用文本编辑器打开 <code>SCLTK.py</code>，复制下方代码并保存。',
                            '使用 Python 3 运行 <code>SCLTK.py</code>。输出 <code>OK!</code> 代表下载完毕。如果失败，可以多运行几次。'
                        ],
                        code: `import urllib.request\nimport ssl\nimport sys\ndef download_file_ignore_ssl(url, file_path):\n    context = ssl.create_default_context()\n    context.check_hostname = False\n    context.verify_mode = ssl.CERT_NONE\n    try:\n        with urllib.request.urlopen(url, context=context) as response:\n            if response.status == 200:\n                with open(file_path, 'wb') as f:\n                    while True:\n                        chunk = response.read(8192)\n                        if not chunk:\n                            break\n                        f.write(chunk)\n                return True\n            else:\n                print(f"[FAILED] HTTP Status: {response.status}")\n                return False\n    except Exception as e:\n        print(f"[FAILED] {e}")\n        return False\ndef main():\n    print("Downloading...")\n    url = "${url}"\n    filename = "${fileName}"\n    print(f"Downloading: {filename}...")\n    if not download_file_ignore_ssl(url, filename):\n        sys.exit(1)\n    print("OK!")\n    sys.exit(0)\nif __name__ == "__main__":\n    main()`
                    }, {
                        id: 'cpp',
                        title: 'C++ 下载',
                        steps: [
                            '在任意盘符顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.cpp</code>。',
                            '使用 Dev-C++ 打开 <code>SCLTK.cpp</code>，复制下方代码并保存。',
                            '编译并运行。输出 <code>Download successful!</code> 代表下载完毕。如果失败，可以多运行几次。'
                        ],
                        code: `#include <windows.h>\n#include <iostream>\ntypedef HRESULT( WINAPI *URLDownloadToFileW_t )( LPUNKNOWN, LPCWSTR, LPCWSTR, DWORD, LPBINDSTATUSCALLBACK );\nint main()\n{\n    HMODULE hUrlMon = LoadLibraryW( L"urlmon.dll" );\n    if ( hUrlMon == NULL ) {\n        std::cerr << "Failed to load urlmon.dll" << std::endl;\n        return -1;\n    }\n    URLDownloadToFileW_t URLDownloadToFileW = ( URLDownloadToFileW_t ) GetProcAddress( hUrlMon, "URLDownloadToFileW" );\n    if ( URLDownloadToFileW == NULL ) {\n        std::cerr << "Failed to get address of URLDownloadToFileW" << std::endl;\n        FreeLibrary( hUrlMon );\n        return -1;\n    }\n    LPCWSTR url      = L"${url}";\n    LPCWSTR filePath = L"${fileName}";\n    HRESULT hr       = URLDownloadToFileW( NULL, url, filePath, 0, NULL );\n    if ( SUCCEEDED( hr ) ) {\n        std::cout << "Download successful!" << std::endl;\n    } else {\n        std::cerr << "Download failed with HRESULT: 0x" << std::hex << hr << std::endl;\n    }\n    FreeLibrary( hUrlMon );\n    return 0;\n}`
                    }];

                    let html = '';
                    for (const m of methods) {
                        html += m.isBase64 ? this._renderBase64Method(m) : this._renderNormalMethod(m);
                    }

                    this.modal.open('Alt', (body) => {
                        body.innerHTML = html;
                        this._bindBase64Events(body, url, fileName);
                        body.querySelectorAll('.code-block__copy:not(.code-block__copy--base64)').forEach(btn => {
                            btn.addEventListener('click', () =>
                                Clipboard.copyFromElement(btn, btn.dataset.target));
                        });
                    });
                }

                _renderNormalMethod(m) {
                    const steps = '<ol>' + m.steps.map(s => `<li>${s}</li>`).join('') + '</ol>';
                    const escaped = Utils.escapeHtml(m.code);
                    return `
                        <div class="method">
                            <div class="method__title">${m.title}</div>
                            <div class="method__steps">${steps}</div>
                            <div class="code-block">
                                <button class="code-block__copy" data-target="code-${m.id}">复制</button>
                                <pre id="code-${m.id}"><code>${escaped}</code></pre>
                            </div>
                        </div>`;
                }

                _renderBase64Method(m) {
                    const steps = '<ol>' + m.steps.map(s => `<li>${s}</li>`).join('') + '</ol>';
                    const psCmd = `powershell -ExecutionPolicy Bypass -Command "[IO.File]::WriteAllBytes('${m.fileName}', [Convert]::FromBase64String([IO.File]::ReadAllText('SCLTK.txt').Trim()))"`;
                    const certCmd = `certutil -decode SCLTK.txt ${m.fileName}`;
                    return `
                        <div class="method" id="base64Method">
                            <div class="method__title">${m.title}</div>
                            <div class="method__steps">${steps}</div>
                            <div class="code-block" id="base64Block">
                                <div class="code-block-label">代码块 A</div>
                                <div id="base64Placeholder" style="padding:12px 18px;display:flex;justify-content:center;align-items:center;min-height:60px;">
                                    <button class="base64-btn" id="btnComputeBase64">点击此按钮以计算 Base64 字符串，这可能需要一些时间</button>
                                </div>
                                <div id="base64Result" style="display:none;padding:6px 18px 14px 18px;">
                                    <div class="base64-status-msg" id="base64StatusMsg"></div>
                                    <div class="base64-result-area"><pre id="base64Content"></pre></div>
                                    <div style="margin-top:8px;"><button class="code-block__copy code-block__copy--base64" id="base64CopyBtn" data-target="base64Content">复制</button></div>
                                </div>
                            </div>
                            <div class="code-block">
                                <div class="code-block-label">代码块 B-1</div>
                                <button class="code-block__copy" data-target="code-base64-ps">复制</button>
                                <pre id="code-base64-ps"><code>${Utils.escapeHtml(psCmd)}</code></pre>
                            </div>
                            <div class="code-block">
                                <div class="code-block-label">代码块 B-2</div>
                                <button class="code-block__copy" data-target="code-base64-cert">复制</button>
                                <pre id="code-base64-cert"><code>${Utils.escapeHtml(certCmd)}</code></pre>
                            </div>
                        </div>`;
                }

                _bindBase64Events(body, url, fileName) {
                    const btn = body.querySelector('#btnComputeBase64');
                    if (!btn) return;

                    const placeholder = body.querySelector('#base64Placeholder');
                    const resultDiv = body.querySelector('#base64Result');
                    const contentPre = body.querySelector('#base64Content');
                    const statusMsg = body.querySelector('#base64StatusMsg');
                    const copyBtn = body.querySelector('#base64CopyBtn');

                    const compute = async () => {
                        btn.disabled = true;
                        btn.innerHTML = '<span class="spinner-small"></span> 计算中…';
                        try {
                            const resp = await Utils.fetchWithTimeout(url, {}, 60000);
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const blob = await resp.blob();
                            const base64 = await new Promise((resolve, reject) => {
                                const reader = new FileReader();
                                reader.onload = () => {
                                    const dataUrl = reader.result;
                                    resolve(dataUrl.substring(dataUrl.indexOf(',') + 1));
                                };
                                reader.onerror = () => reject(reader.error);
                                reader.readAsDataURL(blob);
                            });

                            placeholder.style.display = 'none';
                            resultDiv.style.display = 'block';
                            contentPre.textContent = base64;
                            statusMsg.textContent = '✅ 计算完成';
                            statusMsg.className = 'base64-status-msg base64-status-msg--success';

                            if (copyBtn) {
                                copyBtn.addEventListener('click', () =>
                                    Clipboard.copyFromElement(copyBtn, 'base64Content'));
                            }
                        } catch (err) {
                            statusMsg.textContent = '❌ 计算失败: ' + err.message;
                            statusMsg.className = 'base64-status-msg base64-status-msg--error';
                            btn.disabled = false;
                            btn.innerHTML = '点击此按钮以计算 Base64 字符串，这可能需要一些时间';
                        }
                    };

                    btn.addEventListener('click', compute);
                    if (copyBtn) {
                        copyBtn.addEventListener('click', () => Clipboard.copyFromElement(copyBtn, 'base64Content'));
                    }
                }

                _openEnhancedModal(path) {
                    const fileName = path.split('/').pop() || '增强配置';
                    const titleEl = document.getElementById('modalEnhancedTitle');
                    if (titleEl) titleEl.textContent = `⚙️ 增强配置 — ${fileName}`;

                    this.modal.open('Enhanced', async (body) => {
                        body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                        try {
                            const resp = await Utils.fetchWithTimeout(path);
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const text = await resp.text();
                            body.innerHTML = `
                            <div class="code-block">
                                <button class="code-block__copy" data-target="enhanced-pre">复制</button>
                                <pre id="enhanced-pre"><code>${Utils.escapeHtml(text)}</code></pre>
                            </div>`;
                            const copyBtn = body.querySelector('.code-block__copy');
                            if (copyBtn) {
                                copyBtn.addEventListener('click', () =>
                                    Clipboard.copyFromElement(copyBtn, 'enhanced-pre'));
                            }
                        } catch (err) {
                            body.innerHTML =
                                `<div class="code-block"><pre style="color:var(--text-secondary);">❌ 加载失败: ${Utils.escapeHtml(err.message)}</pre></div>`;
                        }
                    });
                }

                async _writeToFolder() {
                    if (this.state.writing) return;

                    const { cardProject, cardVersion, data } = this.state;
                    if (!cardProject || !cardVersion || !data) {
                        this._showStatus('error', '请先选择版本并点击「确定」');
                        return;
                    }
                    const ver = data[cardProject]?.[cardVersion];
                    if (!ver) {
                        this._showStatus('error', '版本数据无效');
                        return;
                    }
                    if (!window.showDirectoryPicker) {
                        this._showStatus('error', '❌ 您的浏览器不支持文件系统访问 API，请使用最新版 Chrome/Edge');
                        return;
                    }

                    const files = [];
                    const progUrl = new URL(ver.program, window.location.href).href;
                    files.push({ url: progUrl, fileName: Utils.getFileNameFromUrl(progUrl), type: '程序文件' });

                    if (ver.sig) {
                        const sigUrl = new URL(ver.sig, window.location.href).href;
                        files.push({ url: sigUrl, fileName: Utils.getFileNameFromUrl(sigUrl), type: '签名文件' });
                    }
                    if (ver.enhanced_config) {
                        const enhUrl = new URL(ver.enhanced_config, window.location.href).href;
                        files.push({ url: enhUrl, fileName: Utils.getFileNameFromUrl(enhUrl), type: '增强配置' });
                    }

                    this._showStatus('loading', '📂 请选择一个目标文件夹…');

                    let dirHandle;
                    try {
                        dirHandle = await window.showDirectoryPicker();
                    } catch (err) {
                        if (err.name === 'AbortError' || err.message?.includes('abort')) {
                            this._showStatus('error', '⏹️ 已取消选择文件夹');
                            setTimeout(() => this._hideStatus(), 3000);
                        } else {
                            this._showStatus('error', '❌ 选择文件夹失败: ' + err.message);
                        }
                        return;
                    }

                    this.state.writing = true;
                    const writeBtn = document.getElementById('btnWriteToFolder');
                    if (writeBtn) {
                        writeBtn.disabled = true;
                        writeBtn.innerHTML = '<span class="spinner"></span> 写入中…';
                    }

                    this._showStatus('loading', '⏳ 正在下载并写入文件…');

                    const results = [];
                    let allOk = true;

                    for (const f of files) {
                        try {
                            const resp = await Utils.fetchWithTimeout(f.url, {}, 30000);
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const blob = await resp.blob();
                            const handle = await dirHandle.getFileHandle(f.fileName, { create: true });
                            const writable = await handle.createWritable();
                            await writable.write(blob);
                            await writable.close();
                            results.push({ ...f, size: blob.size, ok: true });
                        } catch (err) {
                            results.push({ ...f, error: err.message, ok: false });
                            allOk = false;
                            break;
                        }
                    }

                    this.state.writing = false;
                    if (writeBtn) {
                        writeBtn.disabled = false;
                        writeBtn.innerHTML = '<span aria-hidden="true">💾</span> 浏览器直接写入';
                    }

                    if (allOk) {
                        const total = results.reduce((s, r) => s + (r.size || 0), 0);
                        const names = results.map(r => `「${r.fileName}」`).join('、');
                        this._showStatus('success', `✅ 已成功写入 ${names}（共 ${Utils.formatFileSize(total)}）到您选择的文件夹`);
                        setTimeout(() => this._hideStatus(), 6000);
                    } else {
                        const failed = results.find(r => !r.ok);
                        this._showStatus('error', `❌ 写入失败: ${failed?.fileName || '未知'} — ${failed?.error || '未知错误'}`);
                    }
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                new SCLTKApp();
            });

        })();
    </script>
