<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="SCLTK & SCLTK-Legacy 官方下载站" />
    <title>SCLTK &amp; SCLTK-Legacy 下载站</title>
    <style>
        /* ============================================================
           CSS 变量 & 主题
           ============================================================ */
        :root {
            --bg-body: #f6f8fc;
            --bg-card: #ffffff;
            --bg-header: rgba(255, 255, 255, 0.72);
            --bg-capsule: #e8ecf2;
            --bg-slider: #ffffff;
            --bg-modal: #ffffff;
            --bg-overlay: rgba(0, 0, 0, 0.45);
            --bg-code: #f0f2f8;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #7a7a9a;
            --border-light: #dce0e8;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.08);
            --shadow-capsule: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-btn: 0 4px 14px rgba(79, 124, 255, 0.35);
            --accent: #4f7cff;
            --accent-hover: #3a66e0;
            --accent-light: rgba(79, 124, 255, 0.12);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.10);
            --error-border: rgba(239, 68, 68, 0.20);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --radius-full: 9999px;
            --transition-smooth: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-soft: 0.25s ease;
            --transition-fast: 0.15s ease;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            --font-mono: "Maple Mono NL NF CN", "JetBrains Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
        }

        [data-theme="dark"] {
            --bg-body: #0d0d1a;
            --bg-card: #18182b;
            --bg-header: rgba(24, 24, 43, 0.78);
            --bg-capsule: #28283e;
            --bg-slider: #3a3a5a;
            --bg-modal: #1e1e34;
            --bg-overlay: rgba(0, 0, 0, 0.65);
            --bg-code: #141428;
            --text-primary: #eaeaf0;
            --text-secondary: #b8b8d0;
            --text-muted: #8888aa;
            --border-light: #2e2e4a;
            --shadow-card: 0 8px 30px rgba(0, 0, 0, 0.5);
            --shadow-capsule: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-btn: 0 4px 14px rgba(79, 124, 255, 0.3);
            --accent: #5d85ff;
            --accent-hover: #4a72e8;
            --accent-light: rgba(93, 133, 255, 0.18);
        }

        /* ===== 减少动画偏好 ===== */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* ============================================================
           重置 & 基础
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 24px 48px;
            transition: background var(--transition-soft), color var(--transition-soft);
        }

        /* ============================================================
           布局容器
           ============================================================ */
        .app {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 12px;
        }

        /* ============================================================
           工具栏
           ============================================================ */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .toolbar__group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar__btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            font-family: inherit;
            line-height: 1.5;
        }

        .toolbar__btn:hover {
            background: var(--accent-light);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .toolbar__btn:active {
            transform: translateY(0);
        }

        .toolbar__btn .icon {
            font-size: 1rem;
            line-height: 1;
        }

        .toolbar__btn--theme {
            width: 36px;
            height: 36px;
            padding: 0;
            justify-content: center;
        }

        .toolbar__btn--theme:hover {
            transform: rotate(12deg);
        }

        /* ============================================================
           主卡片
           ============================================================ */
        .main-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            padding: 20px 24px 24px;
            margin-bottom: 24px;
            transition: all var(--transition-soft);
        }

        /* ============================================================
           Banner
           ============================================================ */
        .banner {
            text-align: center;
            padding: 0;
            margin-bottom: 20px;
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .banner__title {
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), #8b6cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .banner__copyright {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            -webkit-text-fill-color: var(--text-muted);
        }

        /* ============================================================
           选择器（胶囊组）
           ============================================================ */
        .selector {
            padding: 0;
            background: transparent;
            box-shadow: none;
            border: none;
        }

        .selector__row {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 8px;
        }

        .selector__item {
            flex: 1;
            min-width: 0;
        }

        .selector__action {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            padding-bottom: 2px;
        }

        /* 胶囊组 */
        .capsule {
            position: relative;
            display: flex;
            background: var(--bg-capsule);
            border-radius: var(--radius-full);
            padding: 3px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
            transition: background var(--transition-soft);
            user-select: none;
            -webkit-user-select: none;
        }

        .capsule__slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: calc(50% - 3px);
            height: calc(100% - 6px);
            background: var(--bg-slider);
            border-radius: var(--radius-full);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), background var(--transition-soft);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            will-change: transform;
            pointer-events: none;
        }

        .capsule__slider--right {
            transform: translateX(100%);
        }

        .capsule__option {
            flex: 1;
            text-align: center;
            padding: 6px 14px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: color var(--transition-soft);
            z-index: 1;
            position: relative;
            border-radius: var(--radius-full);
            letter-spacing: 0.2px;
        }

        .capsule__option--active {
            color: var(--text-primary);
            font-weight: 600;
        }

        .capsule__option:hover:not(.capsule__option--active) {
            color: var(--text-secondary);
        }

        .capsule__option:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* ============================================================
           按钮
           ============================================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius-full);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            letter-spacing: 0.5px;
            white-space: nowrap;
            line-height: 1.5;
            text-decoration: none;
        }

        .btn--primary {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--shadow-btn);
        }

        .btn--primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 124, 255, 0.4);
        }

        .btn--primary:active {
            transform: translateY(0);
        }

        .btn--primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn--confirm {
            padding: 6px 18px;
            height: 34px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn--secondary {
            background: var(--bg-capsule);
            color: var(--text-secondary);
        }

        .btn--secondary:hover {
            background: var(--accent-light);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .btn--secondary:active {
            transform: translateY(0);
        }

        .btn--ghost {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
        }

        .btn--ghost:hover {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn--disabled {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
        }

        /* ============================================================
           状态信息
           ============================================================ */
        .status {
            text-align: center;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-top: 8px;
            display: none;
            font-weight: 500;
            line-height: 1.5;
        }

        .status--error {
            display: block;
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid var(--error-border);
        }

        .status--loading {
            display: block;
            color: var(--text-muted);
            background: var(--bg-capsule);
        }

        /* ============================================================
           下载卡片区域
           ============================================================ */
        .card-area {
            min-height: 100px;
            transition: all var(--transition-soft);
        }

        .card-area__empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border-light);
            transition: all var(--transition-soft);
        }

        .card-area__empty .icon-big {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 12px;
            opacity: 0.5;
            line-height: 1;
        }

        /* ============================================================
           下载卡片
           ============================================================ */
        .download-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.4s ease,
                opacity 0.3s ease;
            transform-origin: top center;
            margin-bottom: 8px;
            opacity: 0;
            transform: translateY(24px) scale(0.96);
            animation: cardEnter 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        .download-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: var(--shadow-card), 0 12px 40px rgba(0, 0, 0, 0.06);
        }

        [data-theme="dark"] .download-card:hover {
            box-shadow: var(--shadow-card), 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .download-card--exit {
            opacity: 0 !important;
            transform: translateY(-10px) scale(0.97) !important;
            transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
            pointer-events: none;
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .download-card__header {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px 14px;
            margin-bottom: 14px;
        }

        .download-card__name {
            font-size: clamp(1.15rem, 3vw, 1.3rem);
            font-weight: 700;
            color: var(--text-primary);
        }

        .download-card__version {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-light);
            padding: 2px 12px;
            border-radius: var(--radius-full);
            letter-spacing: 0.2px;
        }

        .download-card__actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 2px;
        }

        .download-card__sig-hint {
            margin-top: 12px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            border-top: 1px solid var(--border-light);
            padding-top: 12px;
            line-height: 1.5;
        }

        /* ============================================================
           友情链接
           ============================================================ */
        .friends {
            margin-top: 8px;
        }

        .friends__head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
        }

        .friends__title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.3px;
        }

        .friends__count {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-capsule);
            padding: 1px 10px;
            border-radius: var(--radius-full);
            font-weight: 500;
        }

        .friends__grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .friends__link {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: var(--bg-body);
            border: 1px solid var(--border-light);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-fast);
            min-height: 60px;
        }

        .friends__link:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-card);
            border-color: var(--accent);
            background: var(--bg-card);
        }

        .friends__link-top {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .friends__link-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: color var(--transition-fast);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friends__link:hover .friends__link-name {
            color: var(--accent);
        }

        .friends__link-arrow {
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: transform var(--transition-fast), color var(--transition-fast);
            flex-shrink: 0;
            margin-left: auto;
        }

        .friends__link:hover .friends__link-arrow {
            transform: translateX(4px);
            color: var(--accent);
        }

        .friends__link-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 4px;
            line-height: 1.4;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friends__link-desc:empty {
            display: none;
        }

        .friends__empty {
            text-align: center;
            padding: 24px 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            background: var(--bg-body);
            border-radius: var(--radius-sm);
            border: 1px dashed var(--border-light);
        }

        /* ============================================================
           模态框
           ============================================================ */
        .modal {
            position: fixed;
            inset: 0;
            background: var(--bg-overlay);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal--open {
            opacity: 1;
            visibility: visible;
        }

        .modal__box {
            background: var(--bg-modal);
            border-radius: var(--radius-lg);
            max-width: 820px;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            transform: scale(0.95) translateY(12px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal--open .modal__box {
            transform: scale(1) translateY(0);
        }

        .modal__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px 14px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .modal__title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .modal__close {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: var(--bg-capsule);
            font-size: 1.2rem;
            line-height: 1;
            cursor: pointer;
            color: var(--text-muted);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        .modal__close:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .modal__body {
            padding: 18px 24px 24px;
            overflow-y: auto;
            flex: 1;
            line-height: 1.6;
        }

        /* ============================================================
           代码块
           ============================================================ */
        .code-block {
            position: relative;
            background: var(--bg-code);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            overflow: hidden;
            margin: 12px 0;
        }

        .code-block pre,
        .code-block code,
        .raw-content,
        .modal__body pre,
        .modal__body code {
            font-family: var(--font-mono) !important;
            font-size: 0.8rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text-secondary);
        }

        .code-block pre {
            padding: 14px 18px;
            margin: 0;
            background: transparent;
            border: none;
            max-height: 50vh;
            overflow-y: auto;
        }

        .code-block__copy {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--bg-capsule);
            border: none;
            border-radius: var(--radius-sm);
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: var(--font-sans);
            opacity: 0.7;
            z-index: 2;
        }

        .code-block__copy:hover {
            background: var(--accent-light);
            color: var(--accent);
            opacity: 1;
        }

        .code-block__copy--copied {
            background: var(--accent) !important;
            color: #fff !important;
            opacity: 1 !important;
        }

        .raw-content {
            background: var(--bg-code);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            margin: 0;
            max-height: 50vh;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .loading-text {
            color: var(--text-muted);
            font-style: italic;
        }

        /* ============================================================
           公告专用样式
           ============================================================ */
        .announcement-content {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-secondary);
            word-break: break-word;
        }

        .announcement-content>*+* {
            margin-top: 0.75em;
        }

        .announcement-content h2,
        .announcement-content h3,
        .announcement-content h4 {
            color: var(--text-primary);
            margin-top: 1.2em;
            margin-bottom: 0.4em;
            line-height: 1.3;
        }

        .announcement-content h2:first-child,
        .announcement-content h3:first-child,
        .announcement-content h4:first-child {
            margin-top: 0;
        }

        .announcement-content ul,
        .announcement-content ol {
            padding-left: 1.5em;
            margin: 0.5em 0;
        }

        .announcement-content li {
            margin-bottom: 0.35em;
        }

        .announcement-content li>p {
            margin: 0;
        }

        .announcement-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color var(--transition-fast);
        }

        .announcement-content a:hover {
            text-decoration: none;
            border-bottom-color: var(--accent);
        }

        .announcement-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1em;
            margin: 0.5em 0;
            color: var(--text-muted);
        }

        .announcement-content code {
            font-family: var(--font-mono);
            background: var(--bg-capsule);

        /* ============================================================
           滚动条美化

<body>

    <div class="app" role="main">

        <!-- ===== 主卡片 ===== -->
        <div class="main-card">

            <!-- Banner -->
            <header class="banner">
                <h1 class="banner__title">SCLTK &amp; SCLTK-Legacy 下载站</h1>
                <p class="banner__copyright" id="copyrightText">加载版权信息…</p>
            </header>

            <!-- 选择器 -->
            <section class="selector" aria-label="版本选择">
                <div class="selector__row">

                    <div class="selector__item">
                        <div class="capsule" id="projectGroup" role="radiogroup" aria-label="选择项目">
                            <div class="capsule__slider" id="projectSlider"></div>
                            <button class="capsule__option capsule__option--active" data-value="SCLTK" role="radio"
                                aria-checked="true" tabindex="0">SCLTK</button>
                            <button class="capsule__option" data-value="SCLTK-Legacy" role="radio" aria-checked="false"
                                tabindex="-1">SCLTK-Legacy</button>
                        </div>
                    </div>

                    <div class="selector__item">
                        <div class="capsule" id="versionGroup" role="radiogroup" aria-label="选择版本类型">
                            <div class="capsule__slider" id="versionSlider"></div>
                            <button class="capsule__option capsule__option--active" data-value="stable" role="radio"

                <span class="icon-big" aria-hidden="true">📂</span>
                选择版本并点击「确定」查看下载

        <!-- ===== 友情链接 ===== -->
        <section class="friends" id="friendsSection" style="display:none;" aria-label="友情链接">
            <div class="main-card">
                <div class="friends__head">
                    <h2 class="friends__title">🔗 友情链接</h2>
                    <span class="friends__count" id="friendsCount">0</span>

                <div class="friends__grid" id="friendsGrid"></div>
            </div>

    </div>

    <!-- ===== 模态框容器（由 JS 动态生成） ===== -->
    <div id="modalContainer"></div>

    <script>
        /**
         * SCLTK 下载站 - 优化版
         * 架构：模块化 Class + 统一模态框管理 + 工具类
         */
        (function () {
            'use strict';

            /* ==============================================================
               工具类
               ============================================================== */
            class Utils {
                static escapeHtml(text) {
                    const div = document.createElement('div');
                    div.textContent = text;
                    return div.innerHTML;
                }

                static async fetchWithTimeout(url, options = {}, timeout = 10000) {
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), timeout);
                    try {
                        const response = await fetch(url, { ...options, signal: controller.signal });
                        clearTimeout(id);
                        return response;
                    } catch (err) {
                        clearTimeout(id);
                        if (err.name === 'AbortError') throw new Error('请求超时');
                        throw err;
                    }
                }

                static parseJsonc(text) {
                    let out = '';
                    let inStr = false;
                    let strChar = '';
                    let inComment = false;
                    let i = 0;
                    while (i < text.length) {
                        const ch = text[i];
                        if (!inComment && !inStr && ch === '/' && text[i + 1] === '/') {
                            while (i < text.length && text[i] !== '\n' && text[i] !== '\r') i++;
                            continue;
                        }
                        if (!inComment && !inStr && ch === '/' && text[i + 1] === '*') {
                            inComment = true;
                            i += 2;
                            continue;
                        }
                        if (inComment && ch === '*' && text[i + 1] === '/') {
                            inComment = false;
                            i += 2;
                            continue;
                        }
                        if (!inComment && !inStr && (ch === '"' || ch === "'")) {
                            inStr = true;
                            strChar = ch;
                            out += ch;
                            i++;
                            continue;
                        }
                        if (inStr && ch === strChar && text[i - 1] !== '\\') {
                            inStr = false;
                            out += ch;
                            i++;
                            continue;
                        }
                        if (inComment) { i++; continue; }
                        out += ch;
                        i++;
                    }
                    return JSON.parse(out);
                }

                /**
                 * 轻量级 Markdown 解析器（子集）
                 * 支持：标题、粗体、斜体、行内代码、代码块、链接、无序列表、段落
                 */
                static parseMarkdownLite(text) {
                    const lines = text.split('\n');
                    const blocks = [];
                    let currentList = [];
                    let currentCodeBlock = [];
                    let inCodeBlock = false;

                    const flushList = () => {
                        if (currentList.length) {
                            blocks.push('<ul>' + currentList.map(item => `<li>${Utils.escapeHtml(item)}</li>`).join('') + '</ul>');
                            currentList = [];
                        }
                    };

                    const flushCodeBlock = () => {
                        if (currentCodeBlock.length) {
                            const code = Utils.escapeHtml(currentCodeBlock.join('\n'));
                            blocks.push(`<pre><code>${code}</code></pre>`);
                            currentCodeBlock = [];
                        }
                    };

                    for (const line of lines) {
                        const trimmed = line.trim();

                        if (trimmed.startsWith('```')) {
                            if (inCodeBlock) {
                                flushCodeBlock();
                                inCodeBlock = false;
                            } else {
                                flushList();
                                inCodeBlock = true;
                            }
                            continue;
                        }

                        if (inCodeBlock) {
                            currentCodeBlock.push(line);
                            continue;
                        }

                        if (!trimmed) {
                            flushList();
                            continue;
                        }

                        if (/^[-*]\s+/.test(trimmed)) {
                            currentList.push(trimmed.replace(/^[-*]\s+/, ''));
                            continue;
                        }

                        flushList();

                        const headingMatch = trimmed.match(/^(#{1,4})\s+(.*)$/);
                        if (headingMatch) {
                            const level = headingMatch[1].length + 1;
                            const content = Utils.escapeHtml(headingMatch[2]);
                            blocks.push(`<h${level}>${content}</h${level}>`);
                            continue;
                        }

                        blocks.push(Utils.escapeHtml(line));
                    }

                    flushList();
                    if (inCodeBlock) flushCodeBlock();

                    const processed = blocks.map(block => {
                        if (block.startsWith('<h') || block.startsWith('<ul') || block.startsWith('<pre')) {
                            return block;
                        }
                        let content = block;
                        content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                        content = content.replace(/\*(.+?)\*/g, '<em>$1</em>');
                        content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
                        content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
                        return content ? `<p>${content}</p>` : '';
                    });

                    return `<div class="announcement-content">${processed.join('')}</div>`;
                }
            }

            /* ==============================================================
               剪贴板管理
               ============================================================== */
            class ClipboardManager {
                static async copy(text) {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        return true;
                    }
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    const success = document.execCommand('copy');
                    document.body.removeChild(textarea);
                    return success;
                }

                static async copyFromElement(button, targetId) {
                    const pre = document.getElementById(targetId);
                    if (!pre) return false;
                    const success = await this.copy(pre.textContent);
                    if (success) this.showFeedback(button);
                    return success;
                }

                static showFeedback(button) {
                    const originalText = button.textContent;
                    button.textContent = '已复制';
                    button.classList.add('code-block__copy--copied');
                    setTimeout(() => {
                        button.textContent = originalText;
                        button.classList.remove('code-block__copy--copied');
                    }, 2000);
                }
            }

            /* ==============================================================
               模态框管理器
               ============================================================== */
            class ModalManager {
                constructor() {
                    this.activeModal = null;
                    this.modals = new Map();
                    this.container = document.getElementById('modalContainer');
                }

                register(id, config) {
                    this.modals.set(id, config);
                    this.renderModal(id, config);
                    this.bindEvents(id);
                }

                renderModal(id, config) {
                    const { title, bodyId, initialContent } = config;
                    const html = `
                    <div class="modal" id="modal${id}" role="dialog" aria-modal="true" aria-labelledby="modal${id}Title">
                        <div class="modal__box">
                            <div class="modal__header">
                                <h2 class="modal__title" id="modal${id}Title">${title}</h2>
                                <button class="modal__close" id="modal${id}Close" aria-label="关闭">✕</button>
                            </div>
                            <div class="modal__body" id="${bodyId}">
                                ${initialContent || '<span class="loading-text">⏳ 加载中…</span>'}
                            </div>
                        </div>
                    </div>
                `;
                    const wrapper = document.createElement('div');
                    wrapper.innerHTML = html.trim();
                    this.container.appendChild(wrapper.firstElementChild);
                }

                bindEvents(id) {
                    const modal = document.getElementById(`modal${id}`);
                    const closeBtn = document.getElementById(`modal${id}Close`);
                    closeBtn.addEventListener('click', () => this.close(id));
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) this.close(id);
                    });
                }

                open(id, contentCallback) {
                    const modal = document.getElementById(`modal${id}`);
                    if (!modal) return;
                    if (contentCallback) {
                        const body = modal.querySelector('.modal__body');
                        contentCallback(body);
                    }
                    modal.classList.add('modal--open');
                    this.activeModal = modal;
                    document.body.style.overflow = 'hidden';
                }

                close(id) {
                    const modal = id ? document.getElementById(`modal${id}`) : this.activeModal;
                    if (!modal) return;
                    modal.classList.remove('modal--open');
                    if (this.activeModal === modal) {
                        this.activeModal = null;
                        document.body.style.overflow = '';
                    }
                }

                closeAll() {
                    document.querySelectorAll('.modal--open').forEach(m => m.classList.remove('modal--open'));
                    this.activeModal = null;
                    document.body.style.overflow = '';
                }
            }

            /* ==============================================================
               主应用
               ============================================================== */
            class SCLTKApp {
                constructor() {
                    this.state = {
                        data: null,
                        dataLoaded: false,
                        project: 'SCLTK',
                        version: 'stable',
                        cardProject: '',
                        cardVersion: '',
                        theme: 'light',
                        cache: { gpg: null, license: null, announcement: null },
                        flags: { gpgLoaded: false, licenseLoaded: false, announcementLoaded: false }
                    };

                    this.dom = this.cacheDOM();
                    this.modalManager = new ModalManager();
                    this.init();
                }

                cacheDOM() {
                    const $ = (sel, ctx = document) => ctx.querySelector(sel);
                    const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

                    return {
                        copyright: $('#copyrightText'),
                        projectGroup: $('#projectGroup'),
                        versionGroup: $('#versionGroup'),
                        projectSlider: $('#projectSlider'),
                        versionSlider: $('#versionSlider'),
                        projectOpts: () => $$('.capsule__option', $('#projectGroup')),
                        versionOpts: () => $$('.capsule__option', $('#versionGroup')),
                        confirm: $('#btnConfirm'),
                        status: $('#statusMessage'),
                        cardArea: $('#cardArea'),
                        emptyState: $('#emptyState'),
                        btnGpg: $('#btnGpg'),
                        btnLicense: $('#btnLicense'),
                        btnTheme: $('#btnTheme'),
                        themeIcon: $('#themeIcon'),
                        btnAnnouncement: $('#btnAnnouncement'),
                        friendsSection: $('#friendsSection'),
                        friendsGrid: $('#friendsGrid'),
                        friendsCount: $('#friendsCount')
                    };
                }

                async init() {
                    this.initTheme();
                    this.initCapsules();
                    this.initModals();
                    this.initEvents();

                    this.showStatus('loading', '⏳ 加载版本数据…');
                    await this.loadData();

                    if (this.state.dataLoaded) {
                        this.hideStatus();
                        this.setCapsuleValues('SCLTK', 'stable');
                        this.loadGpg().catch(() => { });
                        this.loadLicense().catch(() => { });
                    } else {
                        this.showStatus('error', '❌ 无法加载 /assets/SCLTK-Website.jsonc，请检查文件是否存在');
                    }
                }

                /* ===== 主题 ===== */
                initTheme() {
                    const stored = localStorage.getItem('scltk-theme');
                    if (stored === 'dark' || stored === 'light') {
                        this.setTheme(stored);
                        return;
                    }
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    this.setTheme(prefersDark ? 'dark' : 'light');

                    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                        if (!localStorage.getItem('scltk-theme')) {
                            this.setTheme(e.matches ? 'dark' : 'light');
                        }
                    });
                }

                setTheme(theme) {
                    this.state.theme = theme;
                    document.documentElement.setAttribute('data-theme', theme);
                    this.dom.themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
                    localStorage.setItem('scltk-theme', theme);
                }

                toggleTheme() {
                    this.setTheme(this.state.theme === 'light' ? 'dark' : 'light');
                }

                /* ===== 胶囊组 ===== */
                initCapsules() {
                    this.projectCapsule = this.createCapsule(
                        this.dom.projectSlider,
                        this.dom.projectOpts(),
                        (val) => { this.state.project = val; }
                    );

                    this.versionCapsule = this.createCapsule(
                        this.dom.versionSlider,
                        this.dom.versionOpts(),
                        (val) => { this.state.version = val; }
                    );
                }

                createCapsule(slider, options, onChange) {
                    let active = 0;

                    const setActive = (index) => {
                        if (index === active) return;
                        active = index;
                        slider.classList.toggle('capsule__slider--right', index === 1);
                        options.forEach((opt, i) => {
                            const isActive = i === index;
                            opt.classList.toggle('capsule__option--active', isActive);
                            opt.setAttribute('aria-checked', isActive ? 'true' : 'false');
                            opt.tabIndex = isActive ? 0 : -1;
                        });
                        onChange(options[index].dataset.value);
                    };

                    options.forEach((opt, index) => {
                        opt.addEventListener('click', () => setActive(index));
                        opt.addEventListener('keydown', (e) => {
                            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                                e.preventDefault();
                                const next = (index + 1) % options.length;
                                setActive(next);
                                options[next].focus();
                            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                                e.preventDefault();
                                const prev = (index - 1 + options.length) % options.length;
                                setActive(prev);
                                options[prev].focus();
                            }
                        });
                    });

                    return {
                        getValue: () => options[active].dataset.value,
                        setValue: (val) => {
                            const idx = options.findIndex(o => o.dataset.value === val);
                            if (idx >= 0) setActive(idx);
                        }
                    };
                }

                setCapsuleValues(project, version) {
                    this.projectCapsule.setValue(project);
                    this.versionCapsule.setValue(version);
                    this.state.project = project;
                    this.state.version = version;
                }

                /* ===== 模态框初始化 ===== */
                initModals() {
                    this.modalManager.register('Gpg', {
                        title: '🔑 开发者 GPG 公钥',
                        bodyId: 'gpgBody',
                        initialContent: '<span class="loading-text">⏳ 加载中…</span>'
                    });

                    this.modalManager.register('License', {
                        title: '📄 许可证',
                        bodyId: 'licenseBody',
                        initialContent: '<span class="loading-text">⏳ 加载中…</span>'
                    });

                    this.modalManager.register('Alt', {
                        title: '✨ 备用获取方案',
                        bodyId: 'altBody'
                    });

                    this.modalManager.register('Enhanced', {
                        title: '⚙️ 增强配置',
                        bodyId: 'enhancedBody'
                    });

                    this.modalManager.register('Announcement', {
                        title: '📢 公告',
                        bodyId: 'announcementBody',
                        initialContent: '<span class="loading-text">⏳ 加载中…</span>'
                    });
                }

                /* ===== 事件绑定 ===== */
                initEvents() {
                    this.dom.btnTheme.addEventListener('click', () => this.toggleTheme());

                    this.dom.btnGpg.addEventListener('click', () => {
                        this.modalManager.open('Gpg', async (body) => {
                            if (!this.state.flags.gpgLoaded) {
                                body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                                await this.loadGpg();
                            }
                            body.innerHTML = `<pre class="raw-content">${Utils.escapeHtml(this.state.cache.gpg || '加载失败')}</pre>`;
                        });
                    });

                    this.dom.btnLicense.addEventListener('click', () => {
                        this.modalManager.open('License', async (body) => {
                            if (!this.state.flags.licenseLoaded) {
                                body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                                await this.loadLicense();
                            }
                            body.innerHTML = `<pre class="raw-content">${Utils.escapeHtml(this.state.cache.license || '加载失败')}</pre>`;
                        });
                    });

                    this.dom.btnAnnouncement.addEventListener('click', () => {
                        this.modalManager.open('Announcement', (body) => {
                            if (this.state.flags.announcementLoaded && this.state.cache.announcement) {
                                body.innerHTML = Utils.parseMarkdownLite(this.state.cache.announcement);
                            } else {
                                body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                            }
                        });
                    });

                    this.dom.confirm.addEventListener('click', () => this.handleConfirm());
                    this.dom.confirm.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            this.handleConfirm();
                        }
                    });

                    document.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') this.modalManager.closeAll();
                    });

                    window.addEventListener('unhandledrejection', (e) => {
                        console.error('未处理的 Promise 拒绝:', e.reason);
                        if (!this.state.dataLoaded) {
                            this.showStatus('error', '⚠️ 加载数据时发生错误，请刷新页面重试');
                        }
                    });
                }

                /* ===== 数据加载 ===== */
                async loadData() {
                    try {
                        const resp = await Utils.fetchWithTimeout('/assets/SCLTK-Website.jsonc');
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.data = Utils.parseJsonc(text);
                        this.state.dataLoaded = true;

                        const { copyright, links, announcement_file } = this.state.data;
                        this.dom.copyright.textContent = copyright || '© SCLTK Project';
                        this.renderFriends(links);

                        if (announcement_file && typeof announcement_file === 'string') {
                            const file = announcement_file.trim();
                            if (file) {
                                this.dom.btnAnnouncement.style.display = 'inline-flex';
                                this.loadAnnouncement(file).catch(() => { });
                            }
                        }
                    } catch (err) {
                        console.error('加载 SCLTK-Website.jsonc 失败:', err);
                        this.showStatus('error', '❌ 加载版本数据失败: ' + err.message);
                    }
                }

                async loadGpg() {
                    try {
                        const resp = await Utils.fetchWithTimeout('/assets/gpg-public-key.txt');
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.cache.gpg = text.trim() || '(空)';
                    } catch (err) {
                        console.error('加载 GPG 失败:', err);
                        this.state.cache.gpg = '❌ 加载失败: ' + err.message;
                    }
                    this.state.flags.gpgLoaded = true;
                }

                async loadLicense() {
                    try {
                        const resp = await Utils.fetchWithTimeout('/assets/SCLTK-License.txt');
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.cache.license = text.trim() || '(空)';
                    } catch (err) {
                        console.error('加载 License 失败:', err);
                        this.state.cache.license = '❌ 加载失败: ' + err.message;
                    }
                    this.state.flags.licenseLoaded = true;
                }

                async loadAnnouncement(filePath) {
                    try {
                        let url = filePath;
                        if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('/')) {
                            url = '/assets/' + url;
                        }
                        const resp = await Utils.fetchWithTimeout(url);
                        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                        const text = await resp.text();
                        this.state.cache.announcement = text;
                        this.state.flags.announcementLoaded = true;
                    } catch (err) {
                        console.error('加载公告失败:', err);
                        this.state.cache.announcement = '❌ 加载公告失败: ' + err.message;
                        this.state.flags.announcementLoaded = true;
                        this.dom.btnAnnouncement.style.display = 'none';
                    }
                }

                /* ===== 渲染 ===== */
                renderFriends(links) {
                    if (!Array.isArray(links) || links.length === 0) {
                        this.dom.friendsSection.style.display = 'none';
                        return;
                    }

                    this.dom.friendsCount.textContent = links.length;
                    this.dom.friendsGrid.innerHTML = links.map(link => {
                        const name = Utils.escapeHtml(link.name || '未命名链接');
                        const url = link.url || '#';
                        const desc = link.description || link.desc || '';
                        const descHtml = desc ? `<span class="friends__link-desc">${Utils.escapeHtml(desc)}</span>` : '';
                        return `
                        <a href="${url}" target="_blank" rel="noopener noreferrer" class="friends__link" title="${name}">
                            <span class="friends__link-top">
                                <span class="friends__link-name">${name}</span>
                                <span class="friends__link-arrow" aria-hidden="true">→</span>
                            </span>
                            ${descHtml}
                        </a>
                    `;
                    }).join('');
                    this.dom.friendsSection.style.display = 'block';
                }

                renderCard(projectKey, versionKey) {
                    const data = this.state.data;
                    if (!data) {
                        this.showStatus('error', '数据未加载，请刷新页面重试');
                        return;
                    }

                    const proj = data[projectKey];
                    if (!proj) {
                        this.showStatus('error', `未找到项目 "${projectKey}" 的数据`);
                        return;
                    }

                    const ver = proj[versionKey];
                    if (!ver) {
                        this.showStatus('error', `未找到版本 "${versionKey}" 的数据`);
                        return;
                    }

                    const { version, program, sig, enhanced_config } = ver;
                    if (!version || !program) {
                        this.showStatus('error', '版本数据不完整: 缺少 version 或 program 字段');
                        return;
                    }

                    this.hideStatus();
                    this.state.cardProject = projectKey;
                    this.state.cardVersion = versionKey;

                    const displayName = projectKey === 'SCLTK' ? 'SCLTK' : 'SCLTK-Legacy';
                    const versionLabel = versionKey === 'stable' ? '稳定版' : '预览版';
                    const versionDisplay = `${versionLabel} ${version}`;
                    const hasSig = !!sig;
                    const hasEnhanced = !!enhanced_config;
                    const enhancedFileName = hasEnhanced ? (enhanced_config.split('/').pop() || '配置文件') : '';

                    const actions = [
                        `<a class="btn btn--primary" href="${program}" download><span aria-hidden="true">📥</span> 下载程序</a>`
                    ];

                    if (hasSig) {
                        actions.push(`<a class="btn btn--secondary" href="${sig}" download><span aria-hidden="true">🔏</span> 下载签名</a>`);
                    } else {
                        actions.push(`<span class="btn btn--secondary btn--disabled"><span aria-hidden="true">🔏</span> 签名文件不可用</span>`);
                    }

                    actions.push(`<button class="btn btn--ghost" id="btnAlt"><span aria-hidden="true">✨</span> 备用获取方案</button>`);

                    if (hasEnhanced) {
                        actions.push(`<button class="btn btn--ghost" id="btnEnhanced" data-path="${enhanced_config}"><span aria-hidden="true">⚙️</span> 查看增强配置 ${Utils.escapeHtml(enhancedFileName)}</button>`);
                    }

                    const sigHint = hasSig ? `
                    <div class="download-card__sig-hint">
                        <span aria-hidden="true">💡</span>
                        使用 GPG 签名验证文件完整性，点击左上角「GPG 公钥」查看开发者公钥
                    </div>
                ` : '';

                    const cardHtml = `
                    <div class="download-card" role="article">
                        <div class="download-card__header">
                            <span class="download-card__name">${displayName}</span>
                            <span class="download-card__version">${versionDisplay}</span>
                        </div>
                        <div class="download-card__actions">
                            ${actions.join('')}
                        </div>
                        ${sigHint}
                    </div>
                `;

                    const empty = this.dom.emptyState;
                    if (empty) empty.remove();

                    const existing = this.dom.cardArea.querySelector('.download-card');
                    if (existing) {
                        existing.classList.add('download-card--exit');
                        setTimeout(() => {
                            this.dom.cardArea.innerHTML = cardHtml;
                            this.bindCardButtons();
                        }, 300);
                    } else {
                        this.dom.cardArea.innerHTML = cardHtml;
                        this.bindCardButtons();
                    }
                }

                bindCardButtons() {
                    const altBtn = document.getElementById('btnAlt');
                    if (altBtn) altBtn.addEventListener('click', () => this.openAltModal());

                    const enhancedBtn = document.getElementById('btnEnhanced');
                    if (enhancedBtn) {
                        enhancedBtn.addEventListener('click', () => {
                            const path = enhancedBtn.dataset.path;
                            if (path) this.openEnhancedModal(path);
                        });
                    }
                }

                /* ===== 备用获取方案 ===== */
                openAltModal() {
                    const { cardProject, cardVersion, data } = this.state;
                    if (!cardProject || !cardVersion || !data) return;

                    const proj = data[cardProject];
                    const ver = proj?.[cardVersion];
                    if (!ver?.program) return;

                    let url = ver.program;
                    if (!url.startsWith('http://') && !url.startsWith('https://')) {
                        if (!url.startsWith('/')) url = '/' + url;
                        url = window.location.origin + url;
                    }
                    const fileName = url.split('/').pop();

                    const methods = [
                        {
                            title: 'certutil 下载',
                            steps: [
                                '在任意分区的顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>）。',
                                '点击文件资源管理器的地址栏。',
                                '执行如下命令：'
                            ],
                            code: `certutil -urlcache -split -f "${url}" "${fileName}"`
                        },
                        {
                            title: 'VBScript 下载',
                            steps: [
                                '在任意分区的顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.vbs</code>。',
                                '使用文本编辑器打开 <code>SCLTK.vbs</code>，复制下方代码并保存。',
                                '运行 <code>SCLTK.vbs</code>。弹出 "OK!" 代表下载完毕。如果失败，可以多运行几次。'
                            ],
                            code: `Option Explicit\nDim url, fileName\nurl = "${url}"\nfileName = "${fileName}"\nDim http, stream\nOn Error Resume Next\nSet http = CreateObject("MSXML2.ServerXMLHTTP")\nSet stream = CreateObject("ADODB.Stream")\nhttp.setOption 2, 13056\nhttp.Open "GET", url, False\nhttp.Send\nIf Err.Number <> 0 Then\n    WScript.Echo "[FAILED] Network Error: " & Err.Description\n    WScript.Quit 1\nEnd If\nIf http.Status <> 200 Then\n    WScript.Echo "[FAILED] HTTP Status: " & http.Status\n    WScript.Quit 1\nEnd If\nstream.Type = 1\nstream.Open\nstream.Write http.ResponseBody\nstream.SaveToFile fileName, 2\nstream.Close\nIf Err.Number <> 0 Then\n    WScript.Echo "[FAILED] File Write Error: " & Err.Description\n    WScript.Quit 1\nEnd If\nOn Error GoTo 0\nWScript.Echo "OK!"\nWScript.Quit 0`
                        },
                        {
                            title: 'Python 下载',
                            steps: [
                                '在任意分区顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.py</code>。',
                                '使用文本编辑器打开 <code>SCLTK.py</code>，复制下方代码并保存。',
                                '使用 Python 3 运行 <code>SCLTK.py</code>。输出 "OK!" 代表下载完毕。如果失败，可以多运行几次。'
                            ],
                            code: `import urllib.request\nimport ssl\nimport sys\ndef download_file_ignore_ssl(url, file_path):\n    context = ssl.create_default_context()\n    context.check_hostname = False\n    context.verify_mode = ssl.CERT_NONE\n    try:\n        with urllib.request.urlopen(url, context=context) as response:\n            if response.status == 200:\n                with open(file_path, 'wb') as f:\n                    while True:\n                        chunk = response.read(8192)\n                        if not chunk:\n                            break\n                        f.write(chunk)\n                return True\n            else:\n                print(f"[FAILED] HTTP Status: {response.status}")\n                return False\n    except Exception as e:\n        print(f"[FAILED] {e}")\n        return False\ndef main():\n    print("Downloading...")\n    url = "${url}"\n    filename = "${fileName}"\n    print(f"Downloading: {filename}...")\n    if not download_file_ignore_ssl(url, filename):\n        sys.exit(1)\n    print("OK!")\n    sys.exit(0)\nif __name__ == "__main__":\n    main()`
                        },
                        {
                            title: 'C++ 下载',
                            steps: [
                                '在任意盘符顶级目录下新建一个文件夹（例如 <code>C:\\SCLTK</code>），在文件夹内创建文件 <code>SCLTK.cpp</code>。',
                                '使用 Dev-C++ 打开 <code>SCLTK.cpp</code>，复制下方代码并保存。',
                                '编译并运行。输出 "Download successful!" 代表下载完毕。如果失败，可以多运行几次。'
                            ],
                            code: `#include <windows.h>\n#include <iostream>\ntypedef HRESULT( WINAPI *URLDownloadToFileW_t )( LPUNKNOWN, LPCWSTR, LPCWSTR, DWORD, LPBINDSTATUSCALLBACK );\nint main()\n{\n    HMODULE hUrlMon = LoadLibraryW( L"urlmon.dll" );\n    if ( hUrlMon == NULL ) {\n        std::cerr << "Failed to load urlmon.dll" << std::endl;\n        return -1;\n    }\n    URLDownloadToFileW_t URLDownloadToFileW = ( URLDownloadToFileW_t ) GetProcAddress( hUrlMon, "URLDownloadToFileW" );\n    if ( URLDownloadToFileW == NULL ) {\n        std::cerr << "Failed to get address of URLDownloadToFileW" << std::endl;\n        FreeLibrary( hUrlMon );\n        return -1;\n    }\n    LPCWSTR url      = L"${url}";\n    LPCWSTR filePath = L"${fileName}";\n    HRESULT hr       = URLDownloadToFileW( NULL, url, filePath, 0, NULL );\n    if ( SUCCEEDED( hr ) ) {\n        std::cout << "Download successful!" << std::endl;\n    } else {\n        std::cerr << "Download failed with HRESULT: 0x" << std::hex << hr << std::endl;\n    }\n    FreeLibrary( hUrlMon );\n    return 0;\n}`
                        }
                    ];

                    const html = methods.map((m, idx) => {
                        const stepsHtml = '<ol>' + m.steps.map(s => `<li>${s}</li>`).join('') + '</ol>';
                        const escaped = Utils.escapeHtml(m.code);
                        return `
                        <div class="method">
                            <div class="method__title">${m.title}</div>
                            <div class="method__steps">${stepsHtml}</div>
                            <div class="code-block">
                                <button class="code-block__copy" data-target="code-${idx}">复制</button>
                                <pre id="code-${idx}"><code>${escaped}</code></pre>
                            </div>
                        </div>
                    `;
                    }).join('');

                    this.modalManager.open('Alt', (body) => {
                        body.innerHTML = html;
                        body.querySelectorAll('.code-block__copy').forEach(btn => {
                            btn.addEventListener('click', () => ClipboardManager.copyFromElement(btn, btn.dataset.target));
                        });
                    });
                }

                /* ===== 增强配置 ===== */
                openEnhancedModal(path) {
                    const fileName = path.split('/').pop() || '增强配置';
                    const titleEl = document.getElementById('modalEnhancedTitle');
                    if (titleEl) titleEl.textContent = `⚙️ 增强配置 — ${fileName}`;

                    this.modalManager.open('Enhanced', async (body) => {
                        body.innerHTML = '<span class="loading-text">⏳ 加载中…</span>';
                        try {
                            const resp = await Utils.fetchWithTimeout(path);
                            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                            const text = await resp.text();
                            const escaped = Utils.escapeHtml(text);
                            body.innerHTML = `
                            <div class="code-block">
                                <button class="code-block__copy" data-target="enhanced-pre">复制</button>
                                <pre id="enhanced-pre"><code>${escaped}</code></pre>
                            </div>
                        `;
                            const copyBtn = body.querySelector('.code-block__copy');
                            if (copyBtn) {
                                copyBtn.addEventListener('click', () => ClipboardManager.copyFromElement(copyBtn, 'enhanced-pre'));
                            }
                        } catch (err) {
                            body.innerHTML = `<div class="code-block"><pre style="color: var(--text-secondary);">❌ 加载失败: ${Utils.escapeHtml(err.message)}</pre></div>`;
                        }
                    });
                }

                /* ===== 状态管理 ===== */
                showStatus(type, msg) {
                    const el = this.dom.status;
                    el.className = 'status';
                    el.textContent = msg;
                    el.style.display = msg ? 'block' : 'none';

                    if (type === 'error') {
                        el.classList.add('status--error');
                        this.dom.confirm.disabled = true;
                    } else if (type === 'loading') {
                        el.classList.add('status--loading');
                        this.dom.confirm.disabled = false;
                    } else {
                        this.dom.confirm.disabled = false;
                    }
                }

                hideStatus() {
                    this.dom.status.style.display = 'none';
                    this.dom.status.className = 'status';
                    this.dom.confirm.disabled = false;
                }

                /* ===== 确定按钮 ===== */
                handleConfirm() {
                    if (!this.state.dataLoaded) {
                        this.showStatus('error', '⏳ 数据加载中，请稍候…');
                        return;
                    }
                    const { project, version, data } = this.state;
                    if (!data) {
                        this.showStatus('error', '❌ 数据加载失败，请刷新页面');
                        return;
                    }
                    if (!data[project]) {
                        this.showStatus('error', `项目 "${project}" 不存在`);
                        return;
                    }
                    if (!data[project][version]) {
                        this.showStatus('error', `版本 "${version}" 不存在于 "${project}" 中`);
                        return;
                    }
                    this.renderCard(project, version);
                }
            }

            /* ==============================================================
               启动
               ============================================================== */
            document.addEventListener('DOMContentLoaded', () => {
                new SCLTKApp();
            });
        })();
    </script>

</body>

</html>
